<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>진우네 편육</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to bottom, #eaf4ff, #ffffff);
            font-family: 'Pretendard', sans-serif;
        }

        .main-title {
            color: #0d6efd;
            font-weight: 800;
        }

        .section-title {
            color: #0d6efd;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* 카드 공통 */
        .custom-card {
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.08);
            transition: 0.2s;
        }

        .custom-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(13, 110, 253, 0.15);
        }

        /* 정보 영역 */
        .info-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 300px;
            border-radius: 16px 0 0 16px;
        }

        .info-box {
            padding: 30px;
        }

        .info-label {
            font-weight: 700;
            color: #0d6efd;
            width: 90px;
            display: inline-block;
        }

        .info-desc {
            margin-top: 20px;
            padding: 15px;
            background: #f1f7ff;
            border-radius: 10px;
        }

        /* 메뉴 */
        .menu-img {
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }

        /* 리뷰 */
        .review-link {
            text-decoration: none;
            color: #0d6efd;
            font-weight: 500;
        }

        .review-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .info-img {
                border-radius: 16px 16px 0 0;
            }
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- 1. 상단 -->
    <div class="text-center mb-5">
        <h1 class="main-title">진우네 편육</h1>
        <p class="text-muted">쫄깃한 편육과 매콤한 닭발편육 맛집</p>
    </div>


    <!-- 2. 가게 정보 + 대표 사진 -->
    <div class="card custom-card mb-5">
        <div class="row g-0">

            <!-- 왼쪽 이미지 -->
            <div class="col-md-6">
                <img src="https://via.placeholder.com/800x600"
                     class="info-img"
                     alt="대표 메뉴">
            </div>

            <!-- 오른쪽 정보 -->
            <div class="col-md-6">
                <div class="info-box">
                    <h3 class="section-title">가게 정보</h3>

                    <p><span class="info-label">전화</span>010‑7669‑1158</p>
                    <p><span class="info-label">주소</span>택배 주문만 가능합니다.</p>
                    <p><span class="info-label">택배</span>전국 가능</p>

                    <div class="info-desc">
                        쫄깃한 식감과 깊은 맛을 자랑하는 편육 전문점입니다.
                        술안주, 식사 모두 가능한 만능 메뉴를 제공합니다.
                    </div>
                </div>
            </div>

        </div>
    </div>


    <!-- 3. 메뉴 -->
    <h3 class="section-title">메뉴</h3>
    <div class="row g-4 mb-5">

        <div class="col-md-4">
            <div class="card custom-card p-3">
                <img src="https://via.placeholder.com/400x300" class="menu-img mb-2">
                <h5>편육</h5>
                <p class="text-muted">쫄깃하고 담백한 대표 메뉴</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card custom-card p-3">
                <img src="https://via.placeholder.com/400x300" class="menu-img mb-2">
                <h5>닭발편육</h5>
                <p class="text-muted">매콤한 인기 메뉴</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card custom-card p-3">
                <img src="https://via.placeholder.com/400x300" class="menu-img mb-2">
                <h5>세트메뉴</h5>
                <p class="text-muted">가성비 좋은 구성</p>
            </div>
        </div>

    </div>


    <!-- 4. 리뷰 -->
    <h3 class="section-title">리뷰</h3>
    <div class="row g-3">

        <div class="col-md-6">
            <div class="card custom-card p-3">
                <a class="review-link" href="https://blog.naver.com/pogee774/223941272589" target="_blank">
                    편육맛집 진우네편육 대량 택배 안내
                </a>
                <small class="text-muted">pogee774 블로그</small>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card custom-card p-3">
                <a class="review-link" href="https://blog.naver.com/pogee774/223959622581" target="_blank">
                    닭발편육 솔직 후기
                </a>
                <small class="text-muted">pogee774 블로그</small>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card custom-card p-3">
                <a class="review-link" href="https://blog.naver.com/r8598985/223943040460" target="_blank">
                    전주편육 택배 후기
                </a>
                <small class="text-muted">와니거니</small>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card custom-card p-3">
                <a class="review-link" href="https://blog.naver.com/n5989241/223964637551" target="_blank">
                    만능 안주 맛집 후기
                </a>
                <small class="text-muted">부주 블로그</small>
            </div>
        </div>

    </div>

</div>

</body>
</html>
